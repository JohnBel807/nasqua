<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nasqua | Viajes y Aventura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-deep: #1a3a2a; --green-forest: #2d5a3d; --green-mid: #4a8c5c;
      --green-light: #7dba8a; --earth: #c4956a; --earth-light: #e8c9a0;
      --cream: #f8f4ee; --white: #ffffff; --text-dark: #1a2a1f;
      --text-muted: #5a7065; --gold: #d4a843; --danger: #e05252;
    }

    /* Estilos base de index(1).html */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-dark); overflow-x: hidden; }

    /* NAV ACTUALIZADA */
    nav { position: fixed; top: 0; width: 100%; z-index: 100; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; background: rgba(26, 58, 42, 0.92); backdrop-filter: blur(10px); transition: all 0.3s; }
    .nav-logo img { height: 42px; }
    .nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
    .nav-links a { color: var(--earth-light); text-decoration: none; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold); }
    .nav-admin-btn { background: transparent; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 0.9rem; padding: 5px; transition: color 0.3s; }
    .nav-admin-btn:hover { color: var(--gold); }

    /* SECCIÓN PRÓXIMOS VIAJES (Nueva) */
    #proximos-viajes { background: var(--cream); padding: 6rem 2rem; }
    .viajes-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .viaje-card { background: var(--white); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(26, 58, 42, 0.08); border: 1px solid rgba(26, 58, 42, 0.06); }
    .viaje-fecha-banner { background: var(--green-deep); color: var(--gold); padding: 0.6rem 1.2rem; font-size: 0.8rem; font-weight: 500; }
    .viaje-body { padding: 1.4rem; }
    .viaje-nombre { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    .viaje-precio { font-size: 1.4rem; color: var(--earth); font-weight: 700; font-family: 'Playfair Display', serif; }
    .cupos-badge.few { color: var(--danger); font-weight: bold; }
    .btn-wa { background: #25D366; color: white; padding: 0.6rem 1.2rem; border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; }

    /* MODALES ADMIN */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
    .modal-content { background: var(--white); padding: 2rem; border-radius: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .admin-dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; background: var(--cream); padding: 1rem; border-radius: 10px; }
    .dash-item { text-align: center; }
    .dash-item span { display: block; font-size: 1.2rem; font-weight: 700; color: var(--green-forest); }
    
    input, textarea, select { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px; }
    .btn-submit { background: var(--green-forest); color: white; border: none; padding: 1rem; width: 100%; border-radius: 8px; cursor: pointer; }

    /* Reutilización de otros estilos de index(1).html */
    #hero { height: 100vh; position: relative; overflow: hidden; }
    /* ... (resto de estilos de slider, destinos, footer del index original) ... */
  </style>
</head>

<body>
  <nav id="mainNav">
    <div class="nav-logo"><img src="tu-logo.png" alt="Nasqua"></div>
    <ul class="nav-links">
      <li><a href="#hero">Inicio</a></li>
      <li><a href="#proximos-viajes">Viajes</a></li>
      <li><a href="#destinos">Destinos</a></li>
      <li><a href="#nosotros">Nosotros</a></li>
      <li><button class="nav-admin-btn" onclick="openLogin()">🔐</button></li>
    </ul>
    <a href="https://wa.me/573124711392" class="nav-cta">Reservar</a>
  </nav>

  <section id="proximos-viajes">
    <div class="section-header">
      <span class="section-tag">Aventuras Programadas</span>
      <h2 class="section-title">Próximos <em>Viajes</em></h2>
    </div>
    <div id="viajesContainer" class="viajes-grid">
      </div>
  </section>

  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h3>Acceso Admin</h3><br>
      <input type="text" id="adminUser" placeholder="Usuario">
      <input type="password" id="adminPass" placeholder="Contraseña">
      <button class="btn-submit" onclick="handleLogin()">Entrar</button>
      <button onclick="closeModal('loginModal')" style="background:none; border:none; color:grey; margin-top:10px; cursor:pointer;">Cancelar</button>
    </div>
  </div>

  <div id="adminModal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
      <h2>Panel de Administración</h2>
      <div class="admin-dashboard" id="adminStats"></div>
      
      <h3>Publicar Nuevo Viaje</h3>
      <form id="viajeForm">
        <input type="text" id="vNombre" placeholder="Nombre del Tour" required>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <input type="date" id="vFechaS" required title="Fecha Salida">
          <input type="date" id="vFechaR" required title="Fecha Regreso">
        </div>
        <input type="number" id="vPrecio" placeholder="Precio (COP)" required>
        <input type="number" id="vCupos" placeholder="Cupos Totales" required>
        <textarea id="vDesc" placeholder="Breve descripción"></textarea>
        <button type="submit" class="btn-submit">Publicar Viaje</button>
      </form>

      <h3 style="margin-top:20px;">Viajes Publicados</h3>
      <div id="adminListaViajes"></div>
      <button onclick="closeModal('adminModal')" style="margin-top:20px;">Cerrar Panel</button>
    </div>
  </div>

  <script>
    // Configuración Admin (nasqua / nasqua2025)
    const ADMIN_CREDENTIALS = { user: 'nasqua', pass: 'nasqua2025' };
    let viajes = JSON.parse(localStorage.getItem('nasqua_viajes')) || [];

    // Lógica de Modales
    function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function handleLogin() {
      const u = document.getElementById('adminUser').value;
      const p = document.getElementById('adminPass').value;
      if(u === ADMIN_CREDENTIALS.user && p === ADMIN_CREDENTIALS.pass) {
        closeModal('loginModal');
        openAdminPanel();
      } else { alert('Credenciales incorrectas'); }
    }

    function openAdminPanel() {
      document.getElementById('adminModal').style.display = 'flex';
      renderAdmin();
    }

    // Gestión de Viajes
    document.getElementById('viajeForm').onsubmit = function(e) {
      e.preventDefault();
      const nuevo = {
        id: Date.now(),
        nombre: document.getElementById('vNombre').value,
        fechaS: document.getElementById('vFechaS').value,
        fechaR: document.getElementById('vFechaR').value,
        precio: document.getElementById('vPrecio').value,
        cupos: document.getElementById('vCupos').value,
        desc: document.getElementById('vDesc').value
      };
      viajes.push(nuevo);
      saveViajes();
      this.reset();
      renderAdmin();
      renderPublic();
    };

    function deleteViaje(id) {
      viajes = viajes.filter(v => v.id !== id);
      saveViajes();
      renderAdmin();
      renderPublic();
    }

    function saveViajes() { localStorage.setItem('nasqua_viajes', JSON.stringify(viajes)); }

    // Renderizado
    function renderPublic() {
      const container = document.getElementById('viajesContainer');
      if(viajes.length === 0) {
        container.innerHTML = '<p class="viajes-empty">Pronto publicaremos nuevas fechas...</p>';
        return;
      }
      
      container.innerHTML = viajes.map(v => {
        const diffDays = Math.ceil((new Date(v.fechaS) - new Date()) / (1000 * 60 * 60 * 24));
        const alertaFecha = diffDays <= 15 && diffDays > 0 ? `<span style="color:var(--danger)">⏰ ¡En ${diffDays} días!</span>` : '';
        const cuposClass = v.cupos <= 5 ? 'few' : 'ok';
        
        return `
          <div class="viaje-card">
            <div class="viaje-fecha-banner">📅 ${v.fechaS} al ${v.fechaR} ${alertaFecha}</div>
            <div class="viaje-body">
              <h4 class="viaje-nombre">${v.nombre}</h4>
              <p class="viaje-precio">$${Number(v.precio).toLocaleString()} <span>COP</span></p>
              <p class="cupos-badge ${cuposClass}">Cupos: ${v.cupos}</p>
              <br>
              <a href="https://wa.me/573124711392?text=Hola! Me interesa el tour ${v.nombre} del ${v.fechaS}" class="btn-wa">WhatsApp</a>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderAdmin() {
      const list = document.getElementById('adminListaViajes');
      list.innerHTML = viajes.map(v => `
        <div style="border-bottom:1px solid #eee; padding:10px; display:flex; justify-content:space-between;">
          <span>${v.nombre} (${v.fechaS})</span>
          <button onclick="deleteViaje(${v.id})" style="color:red;">Eliminar</button>
        </div>
      `).join('');
      
      const proximos = viajes.filter(v => (new Date(v.fechaS) - new Date()) / (1000*60*60*24) <= 30).length;
      document.getElementById('adminStats').innerHTML = `
        <div class="dash-item"><span>${viajes.length}</span>Totales</div>
        <div class="dash-item"><span>${proximos}</span>Próximos 30d</div>
        <div class="dash-item"><span>${viajes.reduce((a,b)=>a+parseInt(b.cupos),0)}</span>Cupos</div>
      `;
    }

    // Inicializar
    renderPublic();
  </script>
</body>
</html>
